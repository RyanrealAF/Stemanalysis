<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Analysis Visualization</title>
    <style>
        body { margin: 0; background: #050505; color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; }
        canvas { width: 90vw; height: 40vh; border-bottom: 1px solid #333; }
        .error { color: #ff5555; }
    </style>
</head>
<body>
    <canvas id="viz"></canvas>
    <script>
        async function loadAndRender() {
            try {
                // Ensure the path is correctly resolved relative to the document
                const response = await fetch('./analysis.json');
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                
                const data = await response.json();
                const canvas = document.getElementById('viz');
                const ctx = canvas.getContext('2d');
                
                canvas.width = canvas.offsetWidth;
                canvas.height = canvas.offsetHeight;
                
                ctx.fillStyle = '#00ffcc';
                const barWidth = canvas.width / (data.segments.length || 1);
                
                data.segments.forEach((seg, i) => {
                    const height = (seg.energy || 0) * canvas.height * 10;
                    ctx.fillRect(i * barWidth, canvas.height - height, barWidth - 2, height);
                });
            } catch (error) {
                console.error("Failed to load visualization:", error);
                const ctx = document.getElementById('viz').getContext('2d');
                ctx.fillStyle = '#ff5555';
                ctx.fillText('Error loading data: ' + error.message, 20, 50);
            }
        }
        loadAndRender();
    </script>
</body>
</html>
