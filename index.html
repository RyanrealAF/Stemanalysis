<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Analysis Visualization</title>
    <style>
        body { margin: 0; background: #050505; color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        canvas { width: 90vw; height: 40vh; border-bottom: 1px solid #333; }
        #msg { position: absolute; top: 20px; font-family: sans-serif; }
    </style>
</head>
<body>
    <div id="msg"></div>
    <canvas id="viz"></canvas>
    <script>
        async function loadAndRender() {
            let data = null;
            const paths = ['./analysis.json', '/analysis.json'];

            for (const path of paths) {
                try {
                    const response = await fetch(path);
                    if (response.ok) {
                        data = await response.json();
                        break;
                    }
                } catch (e) {
                    console.warn(`Fetch failed for ${path}`);
                }
            }
            
            // Fallback: If fetch fails, provide test data so the user can see the UI working
            if (!data) {
                console.warn("Using fallback test data.");
                data = {
                    segments: Array.from({length: 20}, () => ({ energy: Math.random() * 0.5 }))
                };
                document.getElementById('msg').innerText = "Note: Using local test data (analysis.json not found).";
            }

            const canvas = document.getElementById('viz');
            const ctx = canvas.getContext('2d');
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
            
            ctx.fillStyle = '#00ffcc';
            const barWidth = canvas.width / (data.segments.length || 1);
            data.segments.forEach((seg, i) => {
                const height = (seg.energy || 0.1) * canvas.height * 2;
                ctx.fillRect(i * barWidth, canvas.height - height, barWidth - 2, height);
            });
        }

        loadAndRender().catch(error => {
            document.getElementById('msg').innerHTML = `<span style="color:red;">Error: ${error.message}</span>`;
        });
    </script>
</body>
</html>
